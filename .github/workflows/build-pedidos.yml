# Build do SistemaPedidosV2 no GitHub (Windows) — não precisa da máquina da empresa.
# Disparo: manual (Actions → Run workflow) ou tag v* (ex.: v2.0.1).
# Artefato: zip com dist/SistemaPedidosV2/ para baixar e publicar na rede.

name: Build Sistema Pedidos

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Versao do codigo (confira o commit)
        run: |
          git rev-parse --short HEAD
          git log -1 --oneline

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: config.py para CI
        run: python tools/prepare_config_ci.py

      - name: Pastas exigidas pelo .spec
        run: New-Item -ItemType Directory -Path database -Force | Out-Null

      - name: PyInstaller
        run: python -m PyInstaller SistemaPedidosV2.spec --clean --noconfirm

      - name: Empacotar artefato
        run: |
          Compress-Archive -Path dist\SistemaPedidosV2\* -DestinationPath SistemaPedidosV2-build.zip -Force

      - name: Upload artefato (30 dias)
        uses: actions/upload-artifact@v4
        with:
          name: SistemaPedidosV2-${{ github.sha }}
          path: SistemaPedidosV2-build.zip
          retention-days: 30

      - name: Release no GitHub (somente tags v*)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: SistemaPedidosV2-build.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
